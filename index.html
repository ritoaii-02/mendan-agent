  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F3F7;
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════
       Sidebar
    ══════════════════════════════ */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #2A2339 0%, #1E1A2E 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.07), transparent 70%);
      pointer-events: none;
    }

    /* Brand */
    .side-top {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #8B7ABA, #6E5DA0);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(110, 93, 160, 0.3);
      flex-shrink: 0;
    }

    .brand-logo svg {
      width: 17px;
      height: 17px;
      fill: rgba(255, 255, 255, 0.95);
    }

    .brand-text h1 {
      font-size: 13.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
    }

    .brand-text p {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* Nav */
    .side-nav {
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-label {
      font-size: 9.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.22);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 8px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-item.active {
      background: rgba(139, 122, 186, 0.12);
      border-color: rgba(139, 122, 186, 0.15);
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-icon.n1 { background: rgba(139, 122, 186, 0.15); }
    .nav-icon.n2 { background: rgba(100, 160, 120, 0.12); }
    .nav-icon.n3 { background: rgba(180, 140, 80, 0.12); }

    .nav-icon svg {
      width: 14px;
      height: 14px;
    }

    .nav-item h3 {
      font-size: 12.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
    }

    .nav-item.active h3 {
      color: rgba(255, 255, 255, 0.92);
      font-weight: 500;
    }

    .side-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 8px 8px;
    }

    /* Hints */
    .side-hints {
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 6px;
    }

    .hint-icon {
      font-size: 11px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .hint-item span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* Footer */
    .side-bottom {
      padding: 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .powered {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .powered-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7CB07C;
      box-shadow: 0 0 6px rgba(124, 176, 124, 0.4);
    }

    .powered span {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.02em;
    }

    .version {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.13);
      letter-spacing: 0.03em;
    }

    /* ══════════════════════════════
       Main Area
    ══════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #FAFAFC;
    }

    /* Top bar */
    .topbar {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #EDEBF0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .topbar-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, #8B7ABA, #6E5DA0);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-icon svg {
      width: 11px;
      height: 11px;
      fill: #fff;
    }

    .topbar span {
      font-size: 12.5px;
      font-weight: 500;
      color: #2D2940;
    }

    /* Chat iframe area */
    .chat-body {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
      border-radius: 0 0 12px 12px;
    }

    .chat-body iframe {
      position: absolute;
      top: -52px;
      left: 0;
      width: 100%;
      height: calc(100% + 52px + 16px);
      border: none;
    }

    /* ══════════════════════════════
       Mobile Header (hidden on desktop)
    ══════════════════════════════ */
    .mobile-header {
      display: none;
      padding: 14px 16px;
      background: #2A2339;
      align-items: center;
      gap: 10px;
    }

    .mobile-header .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 7px;
    }

    .mobile-header .brand-logo svg {
      width: 15px;
      height: 15px;
    }

    .mobile-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
    }

    /* ══════════════════════════════
       Responsive
    ══════════════════════════════ */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .mobile-header {
        display: flex;
      }

      .topbar {
        display: none;
      }
    }
  </style>
</head>
