<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談対策エージェント</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F8F7FA;
      color: #2D2940;
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Left Sidebar ── */
    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #EDEBF0;
      display: flex;
      flex-direction: column;
      padding: 24px 20px 16px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: linear-gradient(135deg, #7C6B9E, #6B5C8A);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-logo svg {
      width: 17px;
      height: 17px;
      fill: #fff;
    }

    .brand h1 {
      font-size: 14px;
      font-weight: 600;
      color: #2D2940;
      letter-spacing: 0.01em;
    }

    .brand-sub {
      font-size: 10px;
      color: #A099B0;
      letter-spacing: 0.03em;
      margin-bottom: 28px;
      padding-left: 44px;
    }

    /* Nav Items */
    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .nav-item:hover {
      background: #F5F3F8;
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .nav-icon.n1 { background: #F0EDF5; }
    .nav-icon.n2 { background: #EDF5F0; }
    .nav-icon.n3 { background: #F5F0ED; }

    .nav-text h3 {
      font-size: 12.5px;
      font-weight: 500;
      color: #2D2940;
    }

    .nav-text p {
      font-size: 10.5px;
      color: #A099B0;
      line-height: 1.45;
      margin-top: 1px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid #EDEBF0;
    }

    .sidebar-badge {
      font-size: 9px;
      color: #A099B0;
      background: #F5F3F8;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      display: inline-block;
    }

    /* ── Right Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 13px 20px;
      border-bottom: 1px solid #EDEBF0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-title {
      font-size: 12.5px;
      font-weight: 500;
      color: #2D2940;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10.5px;
      color: #7CB07C;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7CB07C;
    }

    /* ── Chat iframe ── */
    .chat-body {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #FAFAFE;
    }

    .chat-body iframe {
      position: absolute;
      top: -52px;
      left: 0;
      width: 100%;
      height: calc(100% + 52px);
      border: none;
    }

    /* ── Mobile Header (hidden on desktop) ── */
    .mobile-header {
      display: none;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #EDEBF0;
      align-items: center;
      gap: 10px;
    }

    .mobile-header .brand-logo {
      width: 30px;
      height: 30px;
    }

    .mobile-header .brand-logo svg {
      width: 15px;
      height: 15px;
    }

    .mobile-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #2D2940;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .mobile-header {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- Left Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
        </svg>
      </div>
      <h1>面談対策エージェント</h1>
    </div>
    <div class="brand-sub">Interview Preparation Assistant</div>

    <nav class="nav">
      <div class="nav-item">
        <div class="nav-icon n1">📝</div>
        <div class="nav-text">
          <h3>対策シート作成</h3>
          <p>経歴・Q&A・逆質問を自動生成</p>
        </div>
      </div>
      <div class="nav-item">
        <div class="nav-icon n2">📂</div>
        <div class="nav-text">
          <h3>過去メモ確認</h3>
          <p>SharePointから即取得</p>
        </div>
      </div>
      <div class="nav-item">
        <div class="nav-icon n3">📋</div>
        <div class="nav-text">
          <h3>面談ログ記録</h3>
          <p>振り返りを次回に自動反映</p>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <span class="sidebar-badge">INTERNAL TOOL</span>
    </div>
  </aside>

  <!-- Right Main -->
  <div class="main">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
        </svg>
      </div>
      <h1>面談対策エージェント</h1>
    </div>

    <!-- Chat Header -->
    <div class="chat-header">
      <span class="chat-title">チャット</span>
      <div class="status">
        <div class="status-dot"></div>
        オンライン
      </div>
    </div>

    <!-- Chat Body -->
    <div class="chat-body">
      <iframe
        src="https://copilotstudio.microsoft.com/environments/Default-a24eb182-f4dc-4141-9251-06ef2ac8d70f/bots/cr268_interview_prep_agent/webchat?__version__=2"
        frameborder="0"
        allow="microphone *"
      ></iframe>
    </div>
  </div>

</body>
</html>
