<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談対策エージェント</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F3F7;
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ══════════════════════════════
       Sidebar
    ══════════════════════════════ */
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #2A2339 0%, #1E1A2E 100%);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.07), transparent 70%);
      pointer-events: none;
    }

    /* Brand */
    .side-top {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .brand-logo {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: linear-gradient(135deg, #8B7ABA, #6E5DA0);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(110, 93, 160, 0.3);
      flex-shrink: 0;
    }

    .brand-logo svg {
      width: 17px;
      height: 17px;
      fill: rgba(255, 255, 255, 0.95);
    }

    .brand-text h1 {
      font-size: 13.5px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
    }

    .brand-text p {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* Nav */
    .side-nav {
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
    }

    .nav-label {
      font-size: 9.5px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.22);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 8px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .nav-item.active {
      background: rgba(139, 122, 186, 0.12);
      border-color: rgba(139, 122, 186, 0.15);
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-icon.n1 { background: rgba(139, 122, 186, 0.15); }
    .nav-icon.n2 { background: rgba(100, 160, 120, 0.12); }
    .nav-icon.n3 { background: rgba(180, 140, 80, 0.12); }

    .nav-icon svg {
      width: 14px;
      height: 14px;
    }

    .nav-item h3 {
      font-size: 12.5px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
    }

    .nav-item.active h3 {
      color: rgba(255, 255, 255, 0.92);
      font-weight: 500;
    }

    .side-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.05);
      margin: 8px 8px;
    }

    /* Hints */
    .side-hints {
      padding: 0 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .hint-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 6px;
    }

    .hint-icon {
      font-size: 11px;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .hint-item span {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* Footer */
    .side-bottom {
      padding: 14px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .powered {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .powered-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #7CB07C;
      box-shadow: 0 0 6px rgba(124, 176, 124, 0.4);
    }

    .powered span {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.02em;
    }

    .version {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.13);
      letter-spacing: 0.03em;
    }

    /* ══════════════════════════════
       Main Area
    ══════════════════════════════ */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: #FAFAFC;
    }

    /* Top bar */
    .topbar {
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #EDEBF0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .topbar-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, #8B7ABA, #6E5DA0);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-icon svg {
      width: 11px;
      height: 11px;
      fill: #fff;
    }

    .topbar span {
      font-size: 12.5px;
      font-weight: 500;
      color: #2D2940;
    }

    /* Chat iframe area */
    .chat-body {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .chat-body iframe {
      position: absolute;
      top: -52px;
      left: 0;
      width: 100%;
      height: calc(100% + 52px);
      border: none;
    }

    /* ══════════════════════════════
       Mobile Header (hidden on desktop)
    ══════════════════════════════ */
    .mobile-header {
      display: none;
      padding: 14px 16px;
      background: #2A2339;
      align-items: center;
      gap: 10px;
    }

    .mobile-header .brand-logo {
      width: 30px;
      height: 30px;
      border-radius: 7px;
    }

    .mobile-header .brand-logo svg {
      width: 15px;
      height: 15px;
    }

    .mobile-header h1 {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
    }

    /* ══════════════════════════════
       Responsive
    ══════════════════════════════ */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .mobile-header {
        display: flex;
      }

      .topbar {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="side-top">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>面談対策エージェント</h1>
          <p>AI INTERVIEW ASSISTANT</p>
        </div>
      </div>
    </div>

    <nav class="side-nav">
      <div class="nav-label">機能</div>

      <div class="nav-item active">
        <div class="nav-icon n1">
          <svg viewBox="0 0 24 24" fill="none" stroke="#A090C8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <h3>対策シート作成</h3>
      </div>

      <div class="nav-item">
        <div class="nav-icon n2">
          <svg viewBox="0 0 24 24" fill="none" stroke="#70B080" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h3>過去メモ確認</h3>
      </div>

      <div class="nav-item">
        <div class="nav-icon n3">
          <svg viewBox="0 0 24 24" fill="none" stroke="#C0A060" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </div>
        <h3>面談ログ記録</h3>
      </div>

      <div class="side-divider"></div>

      <div class="side-hints">
        <div class="hint-item">
          <span class="hint-icon">💡</span>
          <span>案件情報を入力するだけでOK</span>
        </div>
        <div class="hint-item">
          <span class="hint-icon">⚡</span>
          <span>過去ログから自動で改善</span>
        </div>
      </div>
    </nav>

    <div class="side-bottom">
      <div class="powered">
        <div class="powered-dot"></div>
        <span>Powered by AI</span>
      </div>
      <span class="version">v1.0</span>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <!-- Mobile Header -->
    <div class="mobile-header">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/>
        </svg>
      </div>
      <h1>面談対策エージェント</h1>
    </div>

    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
        </svg>
      </div>
      <span>新しいチャット</span>
    </div>

    <!-- Chat -->
    <div class="chat-body">
      <iframe
        src="https://copilotstudio.microsoft.com/environments/Default-a24eb182-f4dc-4141-9251-06ef2ac8d70f/bots/cr268_interview_prep_agent/webchat?__version__=2"
        frameborder="0"
        allow="microphone *"
      ></iframe>
    </div>
  </div>

</body>
</html>
